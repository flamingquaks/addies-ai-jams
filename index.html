<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Addie's AI Jams</title>
  <!-- Content Security Policy: block inline injection, only allow media from http(s) sources -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; media-src https: http: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none';">`
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #08080f;
      color: #e2e2f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 4rem 1rem 2.5rem;
      background: radial-gradient(ellipse at top, #1e0a38 0%, #08080f 65%);
      border-bottom: 1px solid #1c1c30;
    }

    .header-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      display: block;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c084fc 0%, #f472b6 50%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      color: #6b6b90;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    /* ── Song list ── */
    .songs-container {
      max-width: 760px;
      margin: 2.5rem auto 4rem;
      padding: 0 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Song card ── */
    .song-card {
      background: #111120;
      border: 1px solid #22223a;
      border-radius: 18px;
      padding: 1.5rem 1.75rem;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .song-card:hover {
      border-color: #7c3aed55;
      box-shadow: 0 0 32px #7c3aed18;
    }

    .song-number {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a4a6a;
      margin-bottom: 0.3rem;
    }

    .song-title-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
    }

    .song-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f0f0ff;
      flex: 1;
      min-width: 0;
    }

    .share-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      font-size: 0.9rem;
      text-decoration: none;
      color: #6b6b90;
      background: transparent;
      border: 1px solid transparent;
      flex-shrink: 0;
      cursor: pointer;
      transition: color 0.18s, background 0.18s, border-color 0.18s;
    }
    .share-link:hover {
      color: #c084fc;
      background: #1a1040;
      border-color: #3b1d7a;
    }
    .share-link.copied {
      color: #4ade80;
      background: #0a2a14;
      border-color: #14532d;
    }

    .song-card.highlight {
      border-color: #a855f7;
      animation: highlight-pulse 2.4s ease-out;
    }

    @keyframes highlight-pulse {
      0%   { box-shadow: 0 0 0       rgba(168, 85, 247, 0); }
      20%  { box-shadow: 0 0 36px    rgba(168, 85, 247, 0.45); }
      100% { box-shadow: 0 0 36px    rgba(168, 85, 247, 0); }
    }

    /* ── Media player (audio + video) ── */
    .media-wrap {
      margin-bottom: 1.1rem;
    }

    audio {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      outline: none;
      accent-color: #a855f7;
    }

    video {
      display: block;
      max-width: 100%;
      max-height: 520px;
      width: auto;
      height: auto;
      margin: 0 auto;
      border-radius: 12px;
      outline: none;
      background: #000;
    }

    .no-media {
      font-size: 0.85rem;
      color: #4a4a6a;
      font-style: italic;
    }

    /* ── Link buttons ── */
    .song-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 1rem;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .link-btn.lyrics {
      background: #1a1040;
      color: #c084fc;
      border: 1px solid #3b1d7a;
    }
    .link-btn.lyrics:hover {
      background: #261655;
      border-color: #7c3aed;
    }

    .link-btn.original {
      background: #1a0f10;
      color: #f87171;
      border: 1px solid #7f2020;
    }
    .link-btn.original:hover {
      background: #2d1515;
      border-color: #ef4444;
    }

    /* ── Sources / inspiration ── */
    .sources-section {
      margin-top: 1.1rem;
      padding-top: 1.1rem;
      border-top: 1px dashed #22223a;
    }

    .sources-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b6b90;
      margin-bottom: 0.7rem;
    }

    .source-item + .source-item {
      margin-top: 0.85rem;
    }

    .source-title {
      font-size: 0.85rem;
      color: #a0a0c0;
      margin-bottom: 0.4rem;
    }

    .source-item audio {
      width: 100%;
      height: 36px;
      border-radius: 8px;
      outline: none;
      accent-color: #f472b6;
    }

    /* ── States ── */
    .state-msg {
      text-align: center;
      padding: 5rem 2rem;
      color: #3a3a5a;
      font-size: 1rem;
    }

    .state-msg .emoji {
      font-size: 2rem;
      display: block;
      margin-bottom: 1rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid #111125;
      color: #2e2e48;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <header>
    <span class="header-icon">🎵</span>
    <h1>Addie's AI Jams</h1>
    <p class="subtitle">songs made with ai &mdash; with a little human soul</p>
  </header>

  <div class="songs-container" id="songs-container">
    <div class="state-msg">
      <span class="emoji">🎶</span>
      Loading songs&hellip;
    </div>
  </div>

  <footer>MADE WITH SUNO AI</footer>

  <script>
    // ── Security helpers ──────────────────────────────────────────────

    // Escape a string for safe insertion as HTML *text content*.
    function escText(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }

    // Escape a string for safe insertion inside an HTML *attribute value*.
    // Handles the additional cases that innerHTML serialisation can miss.
    function escAttr(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Build a URL-safe slug from a song title for deep-linking via hash.
    // "Stone Beneath River" -> "stone-beneath-river"
    function slugify(str) {
      return String(str)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'track';
    }

    // Allow http(s) absolute URLs and safe relative paths (audio/ folder).
    // Blocks javascript:, data:, vbscript:, and any other protocol injection.
    function safeUrl(str) {
      if (!str) return '';
      // Allow absolute http(s) URLs
      try {
        const u = new URL(str);
        if (u.protocol === 'https:' || u.protocol === 'http:') return str;
        return ''; // block data:, javascript:, etc.
      } catch (_) {
        // Not an absolute URL — allow safe relative paths only
        // Must be a clean relative path: letters, digits, /, -, _, . only
        if (/^[a-zA-Z0-9/_\-\.]+$/.test(str)) return str;
        return '';
      }
    }

    // ── Loader ────────────────────────────────────────────────────────

    async function loadSongs() {
      const container = document.getElementById('songs-container');

      try {
        const res = await fetch('songs.json?t=' + Date.now());
        if (!res.ok) throw new Error('Failed to load songs.json');
        const data = await res.json();
        const songs = Array.isArray(data.songs) ? data.songs : [];

        // Build a lookup of shared sources by id (top-level "sources" library).
        // Songs reference these via a `sources: ["id", ...]` array, so one
        // source file can be associated with multiple tracks.
        const sourcesLib = Array.isArray(data.sources) ? data.sources : [];
        const sourcesById = {};
        sourcesLib.forEach(s => {
          if (s && typeof s.id === 'string') sourcesById[s.id] = s;
        });

        if (songs.length === 0) {
          container.innerHTML = `
            <div class="state-msg">
              <span class="emoji">🎵</span>
              No songs yet — check back soon!
            </div>`;
          return;
        }

        // Track which slugs we've used so duplicate titles still get unique
        // ids (e.g. two "Untitled" tracks become `untitled` and `untitled-2`).
        const usedSlugs = new Set();
        function uniqueSlug(base) {
          let s = base, n = 2;
          while (usedSlugs.has(s)) s = base + '-' + n++;
          usedSlugs.add(s);
          return s;
        }

        container.innerHTML = songs.map((song, i) => {
          const rawTitle = song.title || 'Untitled Song';
          const title    = escText(rawTitle);
          const slug     = uniqueSlug(slugify(rawTitle));
          const audio    = safeUrl(song.audio    || '');
          const video    = safeUrl(song.video    || '');
          const lyrics   = safeUrl(song.lyrics   || '');
          const original = safeUrl(song.original || '');

          // Detect file type from extension
          const isVideoFile = /\.(mp4|mov|webm|m4v)(\?|$)/i.test(video || audio);
          const isAudioFile = /\.(mp3|m4a|wav|ogg|aac)(\?|$)/i.test(audio);

          // Prefer explicit video field; fall back to audio field
          const mediaUrl = video || audio;

          let mediaHtml = `<div class="media-wrap"><span class="no-media">Media coming soon</span></div>`;
          if (mediaUrl) {
            if (video || isVideoFile) {
              mediaHtml = `<div class="media-wrap">
                <video controls preload="metadata" playsinline>
                  <source src="${escAttr(mediaUrl)}">
                  <a href="${escAttr(mediaUrl)}">Download video</a>
                </video>
              </div>`;
            } else {
              mediaHtml = `<div class="media-wrap">
                <audio controls preload="none">
                  <source src="${escAttr(mediaUrl)}">
                  <a href="${escAttr(mediaUrl)}">Download audio</a>
                </audio>
              </div>`;
            }
          }

          const lyricsBtn = lyrics
            ? `<a href="${escAttr(lyrics)}" target="_blank" rel="noopener noreferrer" class="link-btn lyrics">📄 Lyrics</a>`
            : '';

          const originalBtn = original
            ? `<a href="${escAttr(original)}" target="_blank" rel="noopener noreferrer" class="link-btn original">🎙️ Original Recording</a>`
            : '';

          // Resolve this song's source ids against the shared library and
          // render a small audio player for each one. Unknown ids are skipped.
          const songSourceIds = Array.isArray(song.sources) ? song.sources : [];
          const sourceItems = songSourceIds.map(id => {
            const src = sourcesById[id];
            if (!src) return '';
            const srcTitle = escText(src.title || 'Source');
            const srcAudio = safeUrl(src.audio || '');
            if (!srcAudio) return '';
            return `
              <div class="source-item">
                <div class="source-title">${srcTitle}</div>
                <audio controls preload="none">
                  <source src="${escAttr(srcAudio)}">
                  <a href="${escAttr(srcAudio)}">Download audio</a>
                </audio>
              </div>`;
          }).join('');

          const sourcesHtml = sourceItems
            ? `<div class="sources-section">
                 <div class="sources-label">🌱 Inspiration</div>
                 ${sourceItems}
               </div>`
            : '';

          return `
            <div class="song-card" id="${escAttr(slug)}">
              <div class="song-number">Track ${i + 1}</div>
              <div class="song-title-row">
                <div class="song-title">${title}</div>
                <a href="#${escAttr(slug)}" class="share-link" title="Copy link to this track" aria-label="Copy link to this track">🔗</a>
              </div>
              ${mediaHtml}
              <div class="song-links">${lyricsBtn}${originalBtn}</div>
              ${sourcesHtml}
            </div>`;
        }).join('');

        // Single-playback: when any audio/video starts, pause every other
        // audio/video on the page. Includes both song players and source
        // (inspiration) players.
        const allMedia = container.querySelectorAll('audio, video');
        allMedia.forEach(el => {
          el.addEventListener('play', () => {
            allMedia.forEach(other => {
              if (other !== el && !other.paused) other.pause();
            });
          });
        });

        // Deep-linking: scroll to and highlight the targeted track.
        function focusTrackFromHash() {
          if (!location.hash) return;
          const id = decodeURIComponent(location.hash.slice(1));
          const target = document.getElementById(id);
          if (!target) return;
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          target.classList.remove('highlight');
          // Force a reflow so the animation re-runs on repeat clicks.
          void target.offsetWidth;
          target.classList.add('highlight');
          setTimeout(() => target.classList.remove('highlight'), 2400);
        }

        // Run once on initial load (give the browser a tick to lay out).
        if (location.hash) setTimeout(focusTrackFromHash, 50);

        // Re-run when the hash changes (e.g. user clicks the 🔗 button).
        window.addEventListener('hashchange', focusTrackFromHash);

        // Clicking a share link copies the absolute URL with the hash so
        // the user can paste it into Slack / a doc / etc.
        container.querySelectorAll('.share-link').forEach(link => {
          link.addEventListener('click', e => {
            e.preventDefault();
            const slug = link.getAttribute('href').slice(1);
            const url = location.origin + location.pathname + '#' + slug;
            // Update the URL bar (no history entry) so reload deep-links work.
            history.replaceState(null, '', '#' + slug);
            const showCopied = () => {
              link.classList.add('copied');
              link.textContent = '✓';
              setTimeout(() => {
                link.classList.remove('copied');
                link.textContent = '🔗';
              }, 1500);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(url).then(showCopied).catch(() => showCopied());
            } else {
              showCopied();
            }
            focusTrackFromHash();
          });
        });

      } catch (err) {
        container.innerHTML = `
          <div class="state-msg">
            <span class="emoji">⚠️</span>
            Couldn't load songs. Please try again later.
          </div>`;
        console.error(err);
      }
    }

    loadSongs();
  </script>
</body>
</html>
