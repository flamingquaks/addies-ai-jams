<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Addie's AI Jams</title>
  <!-- Content Security Policy: block inline injection, only allow media from http(s) sources -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; media-src https: http: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none';">`
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #08080f;
      color: #e2e2f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 4rem 1rem 2.5rem;
      background: radial-gradient(ellipse at top, #1e0a38 0%, #08080f 65%);
      border-bottom: 1px solid #1c1c30;
    }

    .header-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      display: block;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c084fc 0%, #f472b6 50%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      color: #6b6b90;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    /* ── Song list ── */
    .songs-container {
      max-width: 760px;
      margin: 2.5rem auto 4rem;
      padding: 0 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Song card ── */
    .song-card {
      background: #111120;
      border: 1px solid #22223a;
      border-radius: 18px;
      padding: 1.5rem 1.75rem;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .song-card:hover {
      border-color: #7c3aed55;
      box-shadow: 0 0 32px #7c3aed18;
    }

    .song-number {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a4a6a;
      margin-bottom: 0.3rem;
    }

    .song-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f0f0ff;
      margin-bottom: 1.1rem;
    }

    /* ── Media player (audio + video) ── */
    .media-wrap {
      margin-bottom: 1.1rem;
    }

    audio {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      outline: none;
      accent-color: #a855f7;
    }

    video {
      display: block;
      max-width: 100%;
      max-height: 520px;
      width: auto;
      height: auto;
      margin: 0 auto;
      border-radius: 12px;
      outline: none;
      background: #000;
    }

    .no-media {
      font-size: 0.85rem;
      color: #4a4a6a;
      font-style: italic;
    }

    /* ── Link buttons ── */
    .song-links {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 1rem;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .link-btn.lyrics {
      background: #1a1040;
      color: #c084fc;
      border: 1px solid #3b1d7a;
    }
    .link-btn.lyrics:hover {
      background: #261655;
      border-color: #7c3aed;
    }

    .link-btn.original {
      background: #1a0f10;
      color: #f87171;
      border: 1px solid #7f2020;
    }
    .link-btn.original:hover {
      background: #2d1515;
      border-color: #ef4444;
    }

    /* ── States ── */
    .state-msg {
      text-align: center;
      padding: 5rem 2rem;
      color: #3a3a5a;
      font-size: 1rem;
    }

    .state-msg .emoji {
      font-size: 2rem;
      display: block;
      margin-bottom: 1rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid #111125;
      color: #2e2e48;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <header>
    <span class="header-icon">🎵</span>
    <h1>Addie's AI Jams</h1>
    <p class="subtitle">songs made with ai &mdash; with a little human soul</p>
  </header>

  <div class="songs-container" id="songs-container">
    <div class="state-msg">
      <span class="emoji">🎶</span>
      Loading songs&hellip;
    </div>
  </div>

  <footer>MADE WITH SUNO AI</footer>

  <script>
    // ── Security helpers ──────────────────────────────────────────────

    // Escape a string for safe insertion as HTML *text content*.
    function escText(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str)));
      return d.innerHTML;
    }

    // Escape a string for safe insertion inside an HTML *attribute value*.
    // Handles the additional cases that innerHTML serialisation can miss.
    function escAttr(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Allow http(s) absolute URLs and safe relative paths (audio/ folder).
    // Blocks javascript:, data:, vbscript:, and any other protocol injection.
    function safeUrl(str) {
      if (!str) return '';
      // Allow absolute http(s) URLs
      try {
        const u = new URL(str);
        if (u.protocol === 'https:' || u.protocol === 'http:') return str;
        return ''; // block data:, javascript:, etc.
      } catch (_) {
        // Not an absolute URL — allow safe relative paths only
        // Must be a clean relative path: letters, digits, /, -, _, . only
        if (/^[a-zA-Z0-9/_\-\.]+$/.test(str)) return str;
        return '';
      }
    }

    // ── Loader ────────────────────────────────────────────────────────

    async function loadSongs() {
      const container = document.getElementById('songs-container');

      try {
        const res = await fetch('songs.json?t=' + Date.now());
        if (!res.ok) throw new Error('Failed to load songs.json');
        const data = await res.json();
        const songs = Array.isArray(data.songs) ? data.songs : [];

        if (songs.length === 0) {
          container.innerHTML = `
            <div class="state-msg">
              <span class="emoji">🎵</span>
              No songs yet — check back soon!
            </div>`;
          return;
        }

        container.innerHTML = songs.map((song, i) => {
          const title    = escText(song.title    || 'Untitled Song');
          const audio    = safeUrl(song.audio    || '');
          const video    = safeUrl(song.video    || '');
          const lyrics   = safeUrl(song.lyrics   || '');
          const original = safeUrl(song.original || '');

          // Detect file type from extension
          const isVideoFile = /\.(mp4|mov|webm|m4v)(\?|$)/i.test(video || audio);
          const isAudioFile = /\.(mp3|m4a|wav|ogg|aac)(\?|$)/i.test(audio);

          // Prefer explicit video field; fall back to audio field
          const mediaUrl = video || audio;

          let mediaHtml = `<div class="media-wrap"><span class="no-media">Media coming soon</span></div>`;
          if (mediaUrl) {
            if (video || isVideoFile) {
              mediaHtml = `<div class="media-wrap">
                <video controls preload="metadata" playsinline>
                  <source src="${escAttr(mediaUrl)}">
                  <a href="${escAttr(mediaUrl)}">Download video</a>
                </video>
              </div>`;
            } else {
              mediaHtml = `<div class="media-wrap">
                <audio controls preload="none">
                  <source src="${escAttr(mediaUrl)}">
                  <a href="${escAttr(mediaUrl)}">Download audio</a>
                </audio>
              </div>`;
            }
          }

          const lyricsBtn = lyrics
            ? `<a href="${escAttr(lyrics)}" target="_blank" rel="noopener noreferrer" class="link-btn lyrics">📄 Lyrics</a>`
            : '';

          const originalBtn = original
            ? `<a href="${escAttr(original)}" target="_blank" rel="noopener noreferrer" class="link-btn original">🎙️ Original Recording</a>`
            : '';

          return `
            <div class="song-card">
              <div class="song-number">Track ${i + 1}</div>
              <div class="song-title">${title}</div>
              ${mediaHtml}
              <div class="song-links">${lyricsBtn}${originalBtn}</div>
            </div>`;
        }).join('');

      } catch (err) {
        container.innerHTML = `
          <div class="state-msg">
            <span class="emoji">⚠️</span>
            Couldn't load songs. Please try again later.
          </div>`;
        console.error(err);
      }
    }

    loadSongs();
  </script>
</body>
</html>
