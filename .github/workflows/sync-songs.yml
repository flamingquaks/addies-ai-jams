name: Sync Songs from Google Sheets

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # also runnable manually from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        # Pinned to actions/checkout v4.2.2 — update SHA when upgrading
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Fetch sheet and update songs.json
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: |
          python3 - << 'PYEOF'
          import csv, json, os, sys, urllib.request

          url = os.environ.get("SHEET_CSV_URL", "").strip()
          if not url:
              print("ERROR: SHEET_CSV_URL secret is not set.")
              print("Go to: Settings → Secrets and variables → Actions → Secrets")
              print("Add a secret named SHEET_CSV_URL with your published Google Sheet CSV link.")
              sys.exit(1)

          # Security: only allow https:// URLs (blocks file://, localhost, etc.)
          if not url.startswith("https://"):
              print(f"ERROR: SHEET_CSV_URL must start with https:// — got: {url[:30]}")
              sys.exit(1)

          MAX_BYTES = 5 * 1024 * 1024  # 5 MB hard cap

          print(f"Fetching: {url}")
          # NoRedirect handler — we don't need redirects for a published Google Sheet
          opener = urllib.request.build_opener(urllib.request.HTTPErrorProcessor)
          req = urllib.request.Request(url, headers={"User-Agent": "addies-ai-jams/1.0"})
          with urllib.request.urlopen(req, timeout=15) as r:
              # Reject oversized responses before reading
              length = int(r.headers.get("Content-Length") or 0)
              if length > MAX_BYTES:
                  print(f"ERROR: Response too large ({length} bytes). Aborting.")
                  sys.exit(1)
              content = r.read(MAX_BYTES + 1).decode("utf-8")
              if len(content) > MAX_BYTES:
                  print("ERROR: Response exceeded size limit. Aborting.")
                  sys.exit(1)

          songs = []
          reader = csv.reader(content.splitlines())
          rows = list(reader)

          # Skip header row (row 0), iterate the rest in order
          for row in rows[1:]:
              # Pad short rows
              while len(row) < 4:
                  row.append("")
              title    = row[0].strip()[:500]   # cap field lengths
              audio    = row[1].strip()[:2048]
              lyrics   = row[2].strip()[:2048]
              original = row[3].strip()[:2048]

              # Skip completely blank rows
              if not any([title, audio, lyrics, original]):
                  continue

              # Only allow https:// or http:// links (no javascript:, data:, etc.)
              def safe(u):
                  return u if u.startswith(("https://", "http://")) else ""

              songs.append({
                  "title":    title,
                  "audio":    safe(audio),
                  "lyrics":   safe(lyrics),
                  "original": safe(original),
              })

          result = json.dumps({"songs": songs}, indent=2, ensure_ascii=False)
          with open("songs.json", "w", encoding="utf-8") as f:
              f.write(result + "\n")

          print(f"Done — {len(songs)} song(s) written to songs.json")
          PYEOF

      - name: Commit and push if songs.json changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet songs.json && echo "No changes." || \
            (git add songs.json && \
             git commit -m "🎵 Sync songs from Google Sheet [skip ci]" && \
             git push)
